<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axe Financeiro - Terreiro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--verde:#2d6a4f;--verde-claro:#40916c;--verde-bg:#d8f3dc;--branco:#fafaf8;--creme:#f4f1eb;--creme2:#ede8de;--texto:#1a1a18;--texto2:#5a5a55;--texto3:#8a8a82;--borda:rgba(0,0,0,0.1);--vermelho:#c1121f;--vermelho-bg:#ffe5e7;--amarelo:#e9c46a;--amarelo-bg:#fff8e1;--azul:#1b4f72;--azul-bg:#dbeafe;--sombra:0 2px 12px rgba(0,0,0,0.08);--sombra-lg:0 8px 32px rgba(0,0,0,0.12);--radius:12px;--radius-sm:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--creme);color:var(--texto);min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--verde);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s;}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.15);}
.sidebar-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:#fff;line-height:1.2;}
.sidebar-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:rgba(255,255,255,0.75);font-size:14px;font-weight:400;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#d8f3dc;font-weight:500;}
.nav-icon{font-size:18px;width:22px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.15);font-size:12px;color:rgba(255,255,255,0.5);}
.main{margin-left:240px;flex:1;min-height:100vh;}
.topbar{background:var(--branco);border-bottom:1px solid var(--borda);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.content{padding:32px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .2s;}
.btn-primary{background:var(--verde);color:#fff;}
.btn-primary:hover{background:var(--verde-claro);}
.btn-outline{background:transparent;color:var(--verde);border:1.5px solid var(--verde);}
.btn-outline:hover{background:var(--verde-bg);}
.btn-ghost{background:transparent;color:var(--texto2);border:1px solid var(--borda);}
.btn-ghost:hover{background:var(--creme2);}
.btn-sm{padding:6px 12px;font-size:13px;}
.card{background:var(--branco);border-radius:var(--radius);border:1px solid var(--borda);padding:24px;}
.card-sm{padding:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.metric{background:var(--branco);border-radius:var(--radius);border:1px solid var(--borda);padding:20px 24px;}
.metric-label{font-size:12px;color:var(--texto3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.metric-value{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;}
.metric-value.positivo{color:var(--verde);}
.metric-value.negativo{color:var(--vermelho);}
.metric-value.neutro{color:var(--texto);}
.metric-sub{font-size:12px;color:var(--texto3);margin-top:6px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.badge-verde{background:var(--verde-bg);color:var(--verde);}
.badge-vermelho{background:var(--vermelho-bg);color:var(--vermelho);}
.badge-amarelo{background:var(--amarelo-bg);color:#7a5c00;}
.badge-azul{background:var(--azul-bg);color:var(--azul);}
.badge-cinza{background:var(--creme2);color:var(--texto2);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;padding:10px 16px;background:var(--creme);color:var(--texto2);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--borda);}
td{padding:13px 16px;border-bottom:1px solid rgba(0,0,0,0.05);vertical-align:middle;}
tr:hover td{background:rgba(0,0,0,0.02);}
tr:last-child td{border-bottom:none;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--texto2);margin-bottom:6px;}
.form-control{width:100%;padding:10px 14px;border:1.5px solid var(--borda);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texto);background:var(--branco);transition:border .2s;}
.form-control:focus{outline:none;border-color:var(--verde);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--branco);border-radius:var(--radius);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--sombra-lg);transform:translateY(20px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;}
.modal-body{padding:24px;}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end;}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto3);padding:4px;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;font-size:22px;}
.overlay-sidebar{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;}
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.alert-vermelho{background:var(--vermelho-bg);color:var(--vermelho);border:1px solid rgba(193,18,31,0.2);}
.alert-amarelo{background:var(--amarelo-bg);color:#7a5c00;border:1px solid rgba(233,196,106,0.4);}
.alert-verde{background:var(--verde-bg);color:var(--verde);border:1px solid rgba(45,106,79,0.3);}
.progress-bar{height:8px;background:var(--creme2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;}
.chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borda);background:var(--branco);font-size:13px;cursor:pointer;color:var(--texto2);transition:all .2s;font-family:'DM Sans',sans-serif;}
.chip.active{border-color:var(--verde);background:var(--verde-bg);color:var(--verde);font-weight:500;}
.valor-positivo{color:var(--verde);font-weight:500;}
.valor-negativo{color:var(--vermelho);font-weight:500;}
.text-muted{color:var(--texto3);font-size:13px;}
.text-sm{font-size:13px;}
.mb-4{margin-bottom:16px;}
.mb-6{margin-bottom:24px;}
.flex{display:flex;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.gap-2{gap:8px;}
.empty{text-align:center;padding:48px 24px;color:var(--texto3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.quick-action{background:var(--branco);border:1.5px dashed var(--borda);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--texto2);}
.quick-action:hover{border-color:var(--verde);color:var(--verde);background:var(--verde-bg);}
.quick-action-icon{font-size:24px;margin-bottom:8px;}
.quick-action-label{font-size:13px;font-weight:500;}
.page{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:flex;}
  .content{padding:16px;}
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .topbar{padding:12px 16px;}
  .topbar-title{font-size:18px;}
}
@media(max-width:480px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}
@media print{.sidebar,.topbar,.btn,.hamburger{display:none!important;}.main{margin-left:0;}}
</style>
</head>
<body>
<div class="overlay-sidebar" id="overlayBg" onclick="closeSidebar()" style="display:none;"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">&#9789; Axe Financeiro</div>
    <div class="sidebar-sub">Sistema de gestao</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><span class="nav-icon">&#127968;</span> Dashboard</div>
    <div class="nav-item" data-page="mensalidades" onclick="navigate('mensalidades')"><span class="nav-icon">&#128101;</span> Mensalidades</div>
    <div class="nav-item" data-page="lancamentos" onclick="navigate('lancamentos')"><span class="nav-icon">&#128218;</span> Lancamentos</div>
    <div class="nav-item" data-page="cantina" onclick="navigate('cantina')"><span class="nav-icon">&#127859;</span> Cantina</div>
    <div class="nav-item" data-page="rifas" onclick="navigate('rifas')"><span class="nav-icon">&#127903;</span> Rifas e Eventos</div>
    <div class="nav-item" data-page="trabalhadores" onclick="navigate('trabalhadores')"><span class="nav-icon">&#127807;</span> Trabalhadores</div>
    <div class="nav-item" data-page="relatorios" onclick="navigate('relatorios')"><span class="nav-icon">&#128202;</span> Relatorios</div>
  </nav>
  <div class="sidebar-footer">
    <div id="mesAnoAtual"></div>
    <div style="margin-top:4px;">v1.0 - Axe e forca</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <div class="topbar-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="content" id="pageContent"></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="btn-close" onclick="closeModal()">x</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
<script>
const DB_KEY='axe_financeiro_v1';
let db={trabalhadores:[],mensalidades:[],lancamentos:[],rifas:[],cantina:[]};
let paginaAtual='dashboard';
let filtroMesMens,filtroAnoMens,filtroTipoLanc,filtroMesLanc,filtroAnoLanc;

function salvarDB(){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function carregarDB(){const s=localStorage.getItem(DB_KEY);if(s){try{db={...db,...JSON.parse(s)};}catch(e){}}}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fmtData(d){if(!d)return'-';const[y,m,dia]=d.split('-');return dia+'/'+m+'/'+y;}
function mesNome(m){return['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m-1];}
function hoje(){return new Date().toISOString().split('T')[0];}
function getMes(){return new Date().getMonth()+1;}
function getAno(){return new Date().getFullYear();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function confirmar(msg,cb){if(confirm(msg))cb();}

function toggleSidebar(){const s=document.getElementById('sidebar');const o=document.getElementById('overlayBg');s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlayBg').style.display='none';}

const titulos={dashboard:'Dashboard',mensalidades:'Mensalidades',lancamentos:'Lancamentos',cantina:'Cantina',rifas:'Rifas e Eventos',trabalhadores:'Trabalhadores',relatorios:'Relatorios'};
function navigate(page){
  paginaAtual=page;
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.dataset.page===page);
  });
  document.getElementById('pageTitle').textContent=titulos[page]||page;
  document.getElementById('topbarActions').innerHTML='';
  closeSidebar();
  const pages={dashboard:pgDashboard,mensalidades:pgMensalidades,lancamentos:pgLancamentos,cantina:pgCantina,rifas:pgRifas,trabalhadores:pgTrabalhadores,relatorios:pgRelatorios};
  if(pages[page])pages[page]();
}

function openModal(title,body,footer){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// DASHBOARD
function pgDashboard(){
  const mes=getMes(),ano=getAno();
  const ll=db.lancamentos.filter(l=>{const d=new Date(l.data+'T12:00:00');return d.getMonth()+1===mes&&d.getFullYear()===ano;});
  const ent=ll.filter(l=>l.tipo==='receita').reduce((a,l)=>a+l.valor,0);
  const sai=ll.filter(l=>l.tipo==='despesa').reduce((a,l)=>a+l.valor,0);
  const res=ent-sai;
  const mm=db.mensalidades.filter(m=>m.mes===mes&&m.ano===ano);
  const pg=mm.filter(m=>m.status==='pago');
  const pe=mm.filter(m=>m.status==='pendente');
  const recebMens=pg.reduce((a,m)=>a+m.valor,0);
  const totalMens=mm.reduce((a,m)=>a+m.valor,0);
  const pct=mm.length?Math.round(pg.length/mm.length*100):0;
  const ina=db.mensalidades.filter(m=>m.status==='pendente'&&(m.ano<ano||(m.ano===ano&&m.mes<mes)));
  let al='';
  if(ina.length>0)al+='<div class="alert alert-vermelho">&#9888; '+ina.length+' mensalidade(s) em atraso de meses anteriores</div>';
  if(pe.length>0)al+='<div class="alert alert-amarelo">&#128336; '+pe.length+' mensalidade(s) pendente(s) este mes</div>';
  if(!al)al='<div class="alert alert-verde">&#10003; Tudo em dia! Nenhuma pendencia critica.</div>';
  const ult=[...db.lancamentos].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5);
  const ultHTML=ult.length===0?'<tr><td colspan="4"><div class="empty"><div class="empty-icon">&#128218;</div><p>Nenhum lancamento ainda</p></div></td></tr>':ult.map(l=>'<tr><td>'+fmtData(l.data)+'</td><td>'+l.descricao+'</td><td><span class="badge '+(l.tipo==='receita'?'badge-verde':'badge-vermelho')+'">'+l.categoria+'</span></td><td class="'+(l.tipo==='receita'?'valor-positivo':'valor-negativo')+'">'+(l.tipo==='receita'?'+':'-')+fmt(l.valor)+'</td></tr>').join('');
  document.getElementById('pageContent').innerHTML='<div class="page">'+al+'<div class="grid-4 mb-6"><div class="metric"><div class="metric-label">Entradas do mes</div><div class="metric-value positivo">'+fmt(ent)+'</div><div class="metric-sub">'+mesNome(mes)+' '+ano+'</div></div><div class="metric"><div class="metric-label">Saidas do mes</div><div class="metric-value negativo">'+fmt(sai)+'</div><div class="metric-sub">'+mesNome(mes)+' '+ano+'</div></div><div class="metric"><div class="metric-label">Resultado</div><div class="metric-value '+(res>=0?'positivo':'negativo')+'">'+fmt(res)+'</div><div class="metric-sub">'+(res>=0?'Superavit':'Deficit')+'</div></div><div class="metric"><div class="metric-label">Mensalidades</div><div class="metric-value neutro">'+pg.length+'/'+mm.length+'</div><div class="metric-sub">'+fmt(recebMens)+' de '+fmt(totalMens)+'</div></div></div><div class="grid-2 mb-6"><div class="card"><div class="section-header"><div class="section-title">Mensalidades - '+mesNome(mes)+'</div><button class="btn btn-sm btn-outline" onclick="navigate(\'mensalidades\')">Ver todas</button></div><div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span class="text-sm">'+pct+'% recebidas</span><span class="text-sm">'+pg.length+' de '+mm.length+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:var(--verde);"></div></div></div><div style="display:flex;gap:12px;"><div style="flex:1;text-align:center;padding:12px;background:var(--verde-bg);border-radius:var(--radius-sm);"><div style="font-size:20px;font-weight:600;color:var(--verde);">'+pg.length+'</div><div class="text-muted">Pagos</div></div><div style="flex:1;text-align:center;padding:12px;background:var(--vermelho-bg);border-radius:var(--radius-sm);"><div style="font-size:20px;font-weight:600;color:var(--vermelho);">'+pe.length+'</div><div class="text-muted">Pendentes</div></div></div></div><div class="card"><div class="section-title mb-4">Acoes rapidas</div><div class="grid-2" style="gap:10px;"><div class="quick-action" onclick="abrirNovoLanc(\'receita\')"><div class="quick-action-icon">&#128176;</div><div class="quick-action-label">Nova receita</div></div><div class="quick-action" onclick="abrirNovoLanc(\'despesa\')"><div class="quick-action-icon">&#128184;</div><div class="quick-action-label">Nova despesa</div></div><div class="quick-action" onclick="navigate(\'mensalidades\')"><div class="quick-action-icon">&#10003;</div><div class="quick-action-label">Dar baixa</div></div><div class="quick-action" onclick="navigate(\'trabalhadores\')"><div class="quick-action-icon">&#128100;</div><div class="quick-action-label">Trabalhadores</div></div></div></div></div><div class="card"><div class="section-header"><div class="section-title">Ultimos lancamentos</div><button class="btn btn-sm btn-ghost" onclick="navigate(\'lancamentos\')">Ver todos</button></div><div class="table-wrap"><table><thead><tr><th>Data</th><th>Descricao</th><th>Categoria</th><th>Valor</th></tr></thead><tbody>'+ultHTML+'</tbody></table></div></div></div>';
}

// MENSALIDADES
function pgMensalidades(){
  filtroMesMens=filtroMesMens||getMes();
  filtroAnoMens=filtroAnoMens||getAno();
  document.getElementById('topbarActions').innerHTML='<button class="btn btn-primary" onclick="gerarMes()">&#9889; Gerar mes</button>';
  renderMens();
}
function renderMens(){
  const mes=filtroMesMens,ano=filtroAnoMens;
  const lista=db.mensalidades.filter(m=>m.mes===mes&&m.ano===ano);
  const pg=lista.filter(m=>m.status==='pago');
  const pe=lista.filter(m=>m.status==='pendente');
  const totalV=lista.reduce((a,m)=>a+m.valor,0);
  const recV=pg.reduce((a,m)=>a+m.valor,0);
  const mO=Array.from({length:12},(_,i)=>'<option value="'+(i+1)+'" '+(i+1===mes?'selected':'')+'>'+mesNome(i+1)+'</option>').join('');
  const aO=[ano-1,ano,ano+1].map(a=>'<option value="'+a+'" '+(a===ano?'selected':'')+'>'+a+'</option>').join('');
  let lin='';
  if(lista.length===0){lin='<tr><td colspan="5"><div class="empty"><div class="empty-icon">&#128203;</div><p>Nenhuma mensalidade para '+mesNome(mes)+'/'+ano+'</p><p class="text-muted">Clique em "Gerar mes" para criar automaticamente</p></div></td></tr>';}
  else{[...pe,...pg].forEach(m=>{const t=db.trabalhadores.find(x=>x.id===m.trabalhadorId)||{};lin+='<tr><td><strong>'+(t.nome||'?')+'</strong>'+(t.apelido?'<br><span class="text-muted">'+t.apelido+'</span>':'')+'</td><td>'+fmt(m.valor)+'</td><td><span class="badge '+(m.status==='pago'?'badge-verde':'badge-vermelho')+'">'+(m.status==='pago'?'Pago':'Pendente')+'</span></td><td>'+(m.dataPagamento?fmtData(m.dataPagamento):'-')+'</td><td>'+(m.status==='pendente'?'<button class="btn btn-sm btn-primary" onclick="darBaixa(\''+m.id+'\')">&#10003; Dar baixa</button>':'<button class="btn btn-sm btn-ghost" onclick="estornar(\''+m.id+'\')">&#8617; Estornar</button>')+'</td></tr>';});}
  document.getElementById('pageContent').innerHTML='<div class="page"><div class="grid-3 mb-6"><div class="metric"><div class="metric-label">Total do mes</div><div class="metric-value neutro">'+fmt(totalV)+'</div><div class="metric-sub">'+lista.length+' trabalhadores</div></div><div class="metric"><div class="metric-label">Recebido</div><div class="metric-value positivo">'+fmt(recV)+'</div><div class="metric-sub">'+pg.length+' pagamentos</div></div><div class="metric"><div class="metric-label">Em aberto</div><div class="metric-value negativo">'+fmt(totalV-recV)+'</div><div class="metric-sub">'+pe.length+' pendentes</div></div></div><div class="card"><div class="section-header"><div class="section-title">Lista de mensalidades</div><div style="display:flex;gap:8px;"><select class="form-control" style="width:auto;" onchange="filtroMesMens=+this.value;renderMens();">'+mO+'</select><select class="form-control" style="width:auto;" onchange="filtroAnoMens=+this.value;renderMens();">'+aO+'</select></div></div><div class="table-wrap"><table><thead><tr><th>Trabalhador</th><th>Valor</th><th>Status</th><th>Data pagto</th><th>Acao</th></tr></thead><tbody>'+lin+'</tbody></table></div></div></div>';
}
function gerarMes(){
  const mes=filtroMesMens||getMes(),ano=filtroAnoMens||getAno();
  const ativos=db.trabalhadores.filter(t=>t.ativo);
  if(!ativos.length){alert('Nenhum trabalhador ativo. Cadastre primeiro.');navigate('trabalhadores');return;}
  const ja=db.mensalidades.filter(m=>m.mes===mes&&m.ano===ano);
  if(ja.length>0&&!confirm('Ja existem '+ja.length+' mensalidades para este mes. Gerar apenas as que faltam?'))return;
  let n=0;
  ativos.forEach(t=>{if(!db.mensalidades.find(m=>m.mes===mes&&m.ano===ano&&m.trabalhadorId===t.id)){db.mensalidades.push({id:uid(),trabalhadorId:t.id,mes,ano,valor:t.valorMensalidade||50,status:'pendente',dataPagamento:null,obs:''});n++;}});
  salvarDB();alert(n+' mensalidade(s) gerada(s) para '+mesNome(mes)+'/'+ano+'!');renderMens();
}
function darBaixa(id){
  const m=db.mensalidades.find(x=>x.id===id);if(!m)return;
  const t=db.trabalhadores.find(x=>x.id===m.trabalhadorId)||{};
  openModal('Dar baixa - '+t.nome,'<div class="alert alert-amarelo">&#128176; Valor: '+fmt(m.valor)+' - '+mesNome(m.mes)+'/'+m.ano+'</div><div class="form-group"><label class="form-label">Data do pagamento</label><input type="date" class="form-control" id="bxData" value="'+hoje()+'"></div><div class="form-group"><label class="form-label">Forma de pagamento</label><select class="form-control" id="bxForma"><option>PIX</option><option>Dinheiro</option><option>Transferencia</option><option>Cartao</option></select></div>','<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmarBaixa(\''+id+'\')">&#10003; Confirmar pagamento</button>');
}
function confirmarBaixa(id){
  const m=db.mensalidades.find(x=>x.id===id);if(!m)return;
  const t=db.trabalhadores.find(x=>x.id===m.trabalhadorId)||{};
  m.status='pago';
  m.dataPagamento=document.getElementById('bxData').value;
  const forma=document.getElementById('bxForma').value;
  const lancId=uid();
  db.lancamentos.push({id:lancId,data:m.dataPagamento,tipo:'receita',categoria:'Mensalidade',descricao:'Mensalidade '+t.nome+' - '+mesNome(m.mes)+'/'+m.ano,valor:m.valor,formaPagamento:forma,status:'confirmado'});
  m.lancamentoId=lancId; // vincula para estorno preciso
  salvarDB();closeModal();renderMens();
}
function estornar(id){
  confirmar('Estornar este pagamento?',()=>{
    const m=db.mensalidades.find(x=>x.id===id);if(!m)return;
    const t=db.trabalhadores.find(x=>x.id===m.trabalhadorId)||{};
    // remove lançamento vinculado (via lancamentoId salvo no dar baixa, ou fallback por descrição)
    if(m.lancamentoId){
      db.lancamentos=db.lancamentos.filter(l=>l.id!==m.lancamentoId);
    } else {
      const desc='Mensalidade '+t.nome+' - '+mesNome(m.mes)+'/'+m.ano;
      const idx=db.lancamentos.findIndex(l=>l.descricao===desc&&l.tipo==='receita'&&l.categoria==='Mensalidade');
      if(idx>=0)db.lancamentos.splice(idx,1);
    }
    m.status='pendente';m.dataPagamento=null;m.lancamentoId=null;
    salvarDB();renderMens();
  });
}

// LANCAMENTOS
function pgLancamentos(){
  filtroTipoLanc=filtroTipoLanc||'todos';
  filtroMesLanc=filtroMesLanc||getMes();
  filtroAnoLanc=filtroAnoLanc||getAno();

  renderLanc();
}
function renderLanc(){
  const mes=filtroMesLanc,ano=filtroAnoLanc;
  let lista=db.lancamentos.filter(l=>{const d=new Date(l.data+'T12:00:00');return d.getMonth()+1===mes&&d.getFullYear()===ano;});
  if(filtroTipoLanc!=='todos')lista=lista.filter(l=>l.tipo===filtroTipoLanc);
  lista.sort((a,b)=>b.data.localeCompare(a.data));
  const ent=lista.filter(l=>l.tipo==='receita').reduce((a,l)=>a+l.valor,0);
  const sai=lista.filter(l=>l.tipo==='despesa').reduce((a,l)=>a+l.valor,0);
  const mO=Array.from({length:12},(_,i)=>'<option value="'+(i+1)+'" '+(i+1===mes?'selected':'')+'>'+mesNome(i+1)+'</option>').join('');
  const aO=[ano-1,ano,ano+1].map(a=>'<option value="'+a+'" '+(a===ano?'selected':'')+'>'+a+'</option>').join('');
  const lin=lista.length===0?'<tr><td colspan="6"><div class="empty"><div class="empty-icon">&#128218;</div><p>Nenhum lancamento neste periodo</p></div></td></tr>':lista.map(l=>'<tr><td>'+fmtData(l.data)+'</td><td>'+l.descricao+'</td><td><span class="badge '+(l.tipo==='receita'?'badge-verde':'badge-vermelho')+'">'+l.categoria+'</span></td><td>'+(l.formaPagamento||'-')+'</td><td class="'+(l.tipo==='receita'?'valor-positivo':'valor-negativo')+'">'+(l.tipo==='receita'?'+':'-')+fmt(l.valor)+'</td><td><button class="btn btn-sm btn-ghost" onclick="excluirLanc(\''+l.id+'\')">&#128465;</button></td></tr>').join('');
  document.getElementById('pageContent').innerHTML='<div class="page"><div class="grid-3 mb-6"><div class="metric"><div class="metric-label">Entradas</div><div class="metric-value positivo">'+fmt(ent)+'</div></div><div class="metric"><div class="metric-label">Saidas</div><div class="metric-value negativo">'+fmt(sai)+'</div></div><div class="metric"><div class="metric-label">Resultado</div><div class="metric-value '+(ent-sai>=0?'positivo':'negativo')+'">'+fmt(ent-sai)+'</div></div></div><div class="card"><div class="section-header"><div class="chip-group" style="margin:0;"><button class="chip '+(filtroTipoLanc==='todos'?'active':'')+'" onclick="filtroTipoLanc=\'todos\';renderLanc();">Todos</button><button class="chip '+(filtroTipoLanc==='receita'?'active':'')+'" onclick="filtroTipoLanc=\'receita\';renderLanc();">Receitas</button><button class="chip '+(filtroTipoLanc==='despesa'?'active':'')+'" onclick="filtroTipoLanc=\'despesa\';renderLanc();">Despesas</button></div><div style="display:flex;gap:8px;"><select class="form-control" style="width:auto;" onchange="filtroMesLanc=+this.value;renderLanc();">'+mO+'</select><select class="form-control" style="width:auto;" onchange="filtroAnoLanc=+this.value;renderLanc();">'+aO+'</select></div></div><div class="table-wrap"><table><thead><tr><th>Data</th><th>Descricao</th><th>Categoria</th><th>Pagamento</th><th>Valor</th><th></th></tr></thead><tbody>'+lin+'</tbody></table></div></div></div>';
}
function abrirNovoLanc(tipo){
  const cats=['Mensalidade','Cantina','Rifa','Doacao','Curso','Material','Manutencao','Agua/Luz','Outros'];
  const formas=['Dinheiro','PIX','Transferencia','Cartao','Cheque'];
  openModal('Novo lancamento','<div class="form-row mb-4"><div><label class="form-label">Tipo</label><select class="form-control" id="lTipo"><option value="receita" '+(tipo==='receita'?'selected':'')+'>Receita (entrada)</option><option value="despesa" '+(tipo==='despesa'?'selected':'')+'>Despesa (saida)</option></select></div><div><label class="form-label">Data</label><input type="date" class="form-control" id="lData" value="'+hoje()+'"></div></div><div class="form-group"><label class="form-label">Descricao</label><input type="text" class="form-control" id="lDesc" placeholder="Ex: Compra de velas..."></div><div class="form-row"><div><label class="form-label">Categoria</label><select class="form-control" id="lCat">'+cats.map(c=>'<option>'+c+'</option>').join('')+'</select></div><div><label class="form-label">Valor (R$)</label><input type="number" class="form-control" id="lValor" placeholder="0,00" min="0" step="0.01"></div></div><div class="form-group"><label class="form-label">Forma de pagamento</label><select class="form-control" id="lForma">'+formas.map(f=>'<option>'+f+'</option>').join('')+'</select></div>','<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarLanc()">Salvar</button>');
}
function salvarLanc(){
  const tipo=document.getElementById('lTipo').value;
  const data=document.getElementById('lData').value;
  const desc=document.getElementById('lDesc').value.trim();
  const cat=document.getElementById('lCat').value;
  const valor=parseFloat(document.getElementById('lValor').value);
  const forma=document.getElementById('lForma').value;
  if(!data||!desc||!valor||valor<=0){alert('Preencha todos os campos corretamente.');return;}
  db.lancamentos.push({id:uid(),data,tipo,categoria:cat,descricao:desc,valor,formaPagamento:forma,status:'confirmado'});
  salvarDB();closeModal();
  if(paginaAtual==='lancamentos')renderLanc();
  else pgDashboard(); // atualiza dashboard independentemente de onde foi chamado
}
function excluirLanc(id){confirmar('Excluir este lancamento?',()=>{
  db.lancamentos=db.lancamentos.filter(l=>l.id!==id);
  // limpa referências órfãs em mensalidades, cantina e rifas
  db.mensalidades.forEach(m=>{if(m.lancamentoId===id){m.lancamentoId=null;}});
  db.cantina.forEach(c=>{if(c.lancamentoId===id){c.lancamentoId=null;}});
  db.rifas.forEach(r=>{if(r.lancamentoArrId===id)r.lancamentoArrId=null;if(r.lancamentoCusId===id)r.lancamentoCusId=null;});
  salvarDB();renderLanc();
});}

function renderTrabs(){
  const lista=[...db.trabalhadores].sort((a,b)=>a.nome.localeCompare(b.nome));
  const lin=lista.length===0?'<tr><td colspan="6"><div class="empty"><div class="empty-icon">&#127807;</div><p>Nenhum trabalhador cadastrado</p><p class="text-muted">Clique em "+ Trabalhador" para comecar</p></div></td></tr>':lista.map(t=>'<tr><td><strong>'+t.nome+'</strong>'+(t.apelido?'<br><span class="text-muted">'+t.apelido+'</span>':'')+'</td><td>'+(t.telefone||'-')+'</td><td>'+fmt(t.valorMensalidade)+'</td><td>'+fmtData(t.dataIngresso)+'</td><td><span class="badge '+(t.ativo?'badge-verde':'badge-cinza')+'">'+(t.ativo?'Ativo':'Inativo')+'</span></td><td><button class="btn btn-sm btn-ghost" onclick="editTrab(\''+t.id+'\')">&#9999;</button> <button class="btn btn-sm btn-ghost" onclick="delTrab(\''+t.id+'\')">&#128465;</button></td></tr>').join('');
  document.getElementById('pageContent').innerHTML='<div class="page"><div class="grid-3 mb-6"><div class="metric"><div class="metric-label">Total</div><div class="metric-value neutro">'+lista.length+'</div></div><div class="metric"><div class="metric-label">Ativos</div><div class="metric-value positivo">'+lista.filter(t=>t.ativo).length+'</div></div><div class="metric"><div class="metric-label">Mensalidade media</div><div class="metric-value neutro">'+fmt(lista.length?lista.reduce((a,t)=>a+t.valorMensalidade,0)/lista.length:0)+'</div></div></div><div class="card"><div class="section-header"><div class="section-title">Todos os trabalhadores</div></div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Telefone</th><th>Mensalidade</th><th>Ingresso</th><th>Status</th><th>Acoes</th></tr></thead><tbody>'+lin+'</tbody></table></div></div></div>';
}
function formTrab(t){return '<div class="form-row"><div class="form-group"><label class="form-label">Nome completo *</label><input type="text" class="form-control" id="tNome" value="'+(t.nome||'')+'" placeholder="Nome do trabalhador"></div><div class="form-group"><label class="form-label">Apelido / nome de santo</label><input type="text" class="form-control" id="tApelido" value="'+(t.apelido||'')+'" placeholder="Ex: Filho de Ogum"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Telefone</label><input type="tel" class="form-control" id="tTel" value="'+(t.telefone||'')+'" placeholder="(11) 99999-9999"></div><div class="form-group"><label class="form-label">Mensalidade (R$)</label><input type="number" class="form-control" id="tValor" value="'+(t.valorMensalidade||50)+'" min="0" step="0.01"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Data de ingresso</label><input type="date" class="form-control" id="tData" value="'+(t.dataIngresso||hoje())+'"></div><div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px;"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;"><input type="checkbox" id="tAtivo" '+(t.ativo!==false?'checked':'')+' style="width:18px;height:18px;accent-color:var(--verde);"><span class="form-label" style="margin:0;">Trabalhador ativo</span></label></div></div>';}
function novoTrab(){openModal('Novo trabalhador',formTrab({}),'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarTrab()">Salvar</button>');}
function editTrab(id){const t=db.trabalhadores.find(x=>x.id===id);if(!t)return;openModal('Editar trabalhador',formTrab(t),'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarTrab(\''+id+'\')">Salvar</button>');}
function salvarTrab(id){
  const nome=document.getElementById('tNome').value.trim();
  if(!nome){alert('Informe o nome.');return;}

  const valorMensalidade=parseFloat(document.getElementById('tValor').value);
  const dados={
    nome,
    apelido:document.getElementById('tApelido').value.trim(),
    telefone:document.getElementById('tTel').value.trim(),
    valorMensalidade:isNaN(valorMensalidade)?50:valorMensalidade,
    dataIngresso:document.getElementById('tData').value,
    ativo:document.getElementById('tAtivo').checked
  };

  let trabalhador=null;

  if(id){
    trabalhador=db.trabalhadores.find(x=>x.id===id);
    if(!trabalhador){alert('Trabalhador nao encontrado.');return;}
    Object.assign(trabalhador,dados);
  } else {
    trabalhador={id:uid(),...dados};
    db.trabalhadores.push(trabalhador);
  }

  if(!id && trabalhador.ativo){
    const mes=getMes();
    const ano=getAno();
    const jaExiste=db.mensalidades.find(m=>m.trabalhadorId===trabalhador.id&&m.mes===mes&&m.ano===ano);

    if(!jaExiste){
      db.mensalidades.push({
        id:uid(),
        trabalhadorId:trabalhador.id,
        mes,
        ano,
        valor:trabalhador.valorMensalidade||50,
        status:'pendente',
        dataPagamento:null,
        obs:''
      });
    }
  }

  salvarDB();
  closeModal();
  paginaAtual='trabalhadores';
  pgTrabalhadores();
}
function delTrab(id){confirmar('Excluir este trabalhador?',()=>{db.trabalhadores=db.trabalhadores.filter(t=>t.id!==id);salvarDB();renderTrabs();});}

function novaCantina(){openModal('Movimento na Cantina','<div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><select class="form-control" id="cTipo"><option value="entrada">Entrada (venda)</option><option value="custo">Custo (compra)</option></select></div><div class="form-group"><label class="form-label">Data</label><input type="date" class="form-control" id="cData" value="'+hoje()+'"></div></div><div class="form-group"><label class="form-label">Descricao</label><input type="text" class="form-control" id="cDesc" placeholder="Ex: Venda de salgados..."></div><div class="form-group"><label class="form-label">Valor (R$)</label><input type="number" class="form-control" id="cValor" min="0" step="0.01" placeholder="0,00"></div>','<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarCantina()">Salvar</button>');}
function salvarCantina(){

  db.lancamentos.push({id:lancId,data,tipo:tipo==='entrada'?'receita':'despesa',categoria:'Cantina',descricao:'Cantina: '+desc,valor,formaPagamento:'Dinheiro',status:'confirmado'});

function pgRifas(){
  document.getElementById('topbarActions').innerHTML='<button class="btn btn-primary" onclick="novaRifa()">+ Nova rifa/evento</button>';
  renderRifas();
}
function renderRifas(){
  const lista=[...db.rifas].sort((a,b)=>b.data.localeCompare(a.data));
  const totArr=lista.reduce((a,r)=>a+r.arrecadado,0);
  const totCus=lista.reduce((a,r)=>a+r.custo,0);
  const totRes=totArr-totCus;
  let cards=lista.length===0?'<div class="empty"><div class="empty-icon">&#127903;</div><p>Nenhuma rifa ou evento cadastrado</p></div>':lista.map(r=>{const res=r.arrecadado-r.custo;return '<div class="card card-sm mb-4"><div class="flex justify-between items-center mb-4"><div><div style="font-weight:500;font-size:15px;">'+r.nome+'</div><div class="text-muted">'+fmtData(r.data)+' - <span class="badge badge-azul">'+r.tipo+'</span></div></div><button class="btn btn-sm btn-ghost" onclick="delRifa(\''+r.id+'\')">&#128465;</button></div><div class="grid-3" style="gap:8px;text-align:center;"><div style="background:var(--verde-bg);padding:10px;border-radius:var(--radius-sm);"><div style="font-size:13px;color:var(--verde);font-weight:600;">'+fmt(r.arrecadado)+'</div><div class="text-muted" style="font-size:11px;">Arrecadado</div></div><div style="background:var(--vermelho-bg);padding:10px;border-radius:var(--radius-sm);"><div style="font-size:13px;color:var(--vermelho);font-weight:600;">'+fmt(r.custo)+'</div><div class="text-muted" style="font-size:11px;">Custo</div></div><div style="background:'+(res>=0?'var(--verde-bg)':'var(--vermelho-bg)')+';padding:10px;border-radius:var(--radius-sm);"><div style="font-size:13px;color:'+(res>=0?'var(--verde)':'var(--vermelho)')+';font-weight:600;">'+fmt(res)+'</div><div class="text-muted" style="font-size:11px;">Resultado</div></div></div></div>';}).join('');
  document.getElementById('pageContent').innerHTML='<div class="page"><div class="grid-3 mb-6"><div class="metric"><div class="metric-label">Total arrecadado</div><div class="metric-value positivo">'+fmt(totArr)+'</div><div class="metric-sub">'+lista.length+' evento(s)</div></div><div class="metric"><div class="metric-label">Total de custos</div><div class="metric-value negativo">'+fmt(totCus)+'</div></div><div class="metric"><div class="metric-label">Resultado geral</div><div class="metric-value '+(totRes>=0?'positivo':'negativo')+'">'+fmt(totRes)+'</div></div></div>'+cards+'</div>';
}
function novaRifa(){openModal('Nova rifa / evento','<div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-control" id="rNome" placeholder="Ex: Rifa junina..."></div><div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><select class="form-control" id="rTipo"><option>Rifa</option><option>Evento</option><option>Bingo</option><option>Gincana</option><option>Outro</option></select></div><div class="form-group"><label class="form-label">Data</label><input type="date" class="form-control" id="rData" value="'+hoje()+'"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Total arrecadado (R$)</label><input type="number" class="form-control" id="rArr" min="0" step="0.01" placeholder="0,00"></div><div class="form-group"><label class="form-label">Custo total (R$)</label><input type="number" class="form-control" id="rCus" min="0" step="0.01" placeholder="0,00"></div></div>','<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarRifa()">Salvar</button>');}
function salvarRifa(){
  const nome=document.getElementById('rNome').value.trim();
  const tipo=document.getElementById('rTipo').value;
  const data=document.getElementById('rData').value;
  const arr=parseFloat(document.getElementById('rArr').value)||0;
  const cus=parseFloat(document.getElementById('rCus').value)||0;
  if(!nome||!data){alert('Preencha nome e data.');return;}
  const lancArrId=arr>0?uid():null;
  const lancCusId=cus>0?uid():null;
  db.rifas.push({id:uid(),nome,tipo,data,arrecadado:arr,custo:cus,lancamentoArrId:lancArrId,lancamentoCusId:lancCusId});
  if(lancArrId)db.lancamentos.push({id:lancArrId,data,tipo:'receita',categoria:'Rifa',descricao:tipo+': '+nome,valor:arr,formaPagamento:'Dinheiro',status:'confirmado'});
  if(lancCusId)db.lancamentos.push({id:lancCusId,data,tipo:'despesa',categoria:'Rifa',descricao:'Custo '+tipo+': '+nome,valor:cus,formaPagamento:'Dinheiro',status:'confirmado'});
  salvarDB();closeModal();renderRifas();
}
function delRifa(id){confirmar('Excluir esta rifa/evento?',()=>{
  const rifa=db.rifas.find(r=>r.id===id);
  if(rifa){
    if(rifa.lancamentoArrId)db.lancamentos=db.lancamentos.filter(l=>l.id!==rifa.lancamentoArrId);
    if(rifa.lancamentoCusId)db.lancamentos=db.lancamentos.filter(l=>l.id!==rifa.lancamentoCusId);
  }
  db.rifas=db.rifas.filter(r=>r.id!==id);
  salvarDB();renderRifas();
});}

// RELATORIOS
function pgRelatorios(){
  document.getElementById('topbarActions').innerHTML='<button class="btn btn-outline" onclick="window.print()">&#128438; Imprimir</button>';
  const ano=getAno();
  const resumos=Array.from({length:12},(_,i)=>{
    const m=i+1;
    const ll=db.lancamentos.filter(l=>{const d=new Date(l.data+'T12:00:00');return d.getMonth()+1===m&&d.getFullYear()===ano;});
    const e=ll.filter(l=>l.tipo==='receita').reduce((a,l)=>a+l.valor,0);
    const s=ll.filter(l=>l.tipo==='despesa').reduce((a,l)=>a+l.valor,0);
    const mm=db.mensalidades.filter(x=>x.mes===m&&x.ano===ano);
    return{m,e,s,res:e-s,pg:mm.filter(x=>x.status==='pago').length,tot:mm.length};
  });
  const porCat={};
  db.lancamentos.forEach(l=>{const d=new Date(l.data+'T12:00:00');if(d.getFullYear()===ano){if(!porCat[l.categoria])porCat[l.categoria]={receita:0,despesa:0};porCat[l.categoria][l.tipo]+=l.valor;}});
  const ina={};
  db.mensalidades.filter(m=>m.status==='pendente').forEach(m=>{const t=db.trabalhadores.find(x=>x.id===m.trabalhadorId)||{nome:'?'};if(!ina[t.nome])ina[t.nome]=[];ina[t.nome].push(mesNome(m.mes)+'/'+m.ano);});
  const totalE=resumos.reduce((a,r)=>a+r.e,0);
  const totalS=resumos.reduce((a,r)=>a+r.s,0);
  const linR=resumos.map(r=>'<tr><td><strong>'+mesNome(r.m)+'</strong></td><td class="valor-positivo">'+fmt(r.e)+'</td><td class="valor-negativo">'+fmt(r.s)+'</td><td class="'+(r.res>=0?'valor-positivo':'valor-negativo')+'">'+fmt(r.res)+'</td><td>'+r.pg+'/'+r.tot+'</td></tr>').join('');
  const linC=Object.entries(porCat).map(([c,v])=>'<tr><td>'+c+'</td><td class="valor-positivo">'+fmt(v.receita)+'</td><td class="valor-negativo">'+fmt(v.despesa)+'</td><td class="'+(v.receita-v.despesa>=0?'valor-positivo':'valor-negativo')+'">'+fmt(v.receita-v.despesa)+'</td></tr>').join('')||'<tr><td colspan="4"><span class="text-muted">Sem dados</span></td></tr>';
  const linI=Object.keys(ina).length===0?'<tr><td colspan="2"><span class="text-muted">Nenhuma inadimplencia</span></td></tr>':Object.entries(ina).map(([n,ms])=>'<tr><td><strong>'+n+'</strong></td><td>'+ms.join(', ')+'</td></tr>').join('');
  document.getElementById('pageContent').innerHTML='<div class="page"><div class="alert alert-verde mb-6">&#128202; Relatorio referente ao ano de '+ano+'</div><div class="card mb-6"><div class="section-header"><div class="section-title">Resumo mensal - '+ano+'</div></div><div class="table-wrap"><table><thead><tr><th>Mes</th><th>Entradas</th><th>Saidas</th><th>Resultado</th><th>Mensalidades</th></tr></thead><tbody>'+linR+'</tbody><tfoot><tr style="font-weight:600;background:var(--creme);"><td>TOTAL ANUAL</td><td class="valor-positivo">'+fmt(totalE)+'</td><td class="valor-negativo">'+fmt(totalS)+'</td><td class="'+(totalE-totalS>=0?'valor-positivo':'valor-negativo')+'">'+fmt(totalE-totalS)+'</td><td>-</td></tr></tfoot></table></div></div><div class="grid-2"><div class="card"><div class="section-header"><div class="section-title">Por categoria</div></div><div class="table-wrap"><table><thead><tr><th>Categoria</th><th>Receitas</th><th>Despesas</th><th>Resultado</th></tr></thead><tbody>'+linC+'</tbody></table></div></div><div class="card"><div class="section-header"><div class="section-title">Inadimplencias em aberto</div></div><div class="table-wrap"><table><thead><tr><th>Trabalhador</th><th>Meses em aberto</th></tr></thead><tbody>'+linI+'</tbody></table></div></div></div></div>';
}
